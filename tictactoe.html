<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 0;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      color: #a8dadc;
      min-height: 1.5rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #c73652; }

    #mode-btn {
      background: #0f3460;
    }
    #mode-btn:hover { background: #16478a; }
    #mode-btn.active {
      background: #457b9d;
    }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2.5rem;
      font-size: 1rem;
      color: #888;
    }

    #score span { text-align: center; }
    #score strong { display: block; font-size: 1.6rem; color: #eee; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status"></div>
  <div id="board"></div>
  <div id="controls">
    <button id="restart-btn">Restart</button>
    <button id="mode-btn">vs CPU</button>
  </div>
  <div id="score">
    <span><strong id="sx">0</strong>X</span>
    <span><strong id="sd">0</strong>Draw</span>
    <span><strong id="so">0</strong>O</span>
  </div>

  <script>
    const boardEl   = document.getElementById('board');
    const statusEl  = document.getElementById('status');
    const restartBtn = document.getElementById('restart-btn');
    const modeBtn   = document.getElementById('mode-btn');

    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let cells, current, over;
    let vsCPU = false;
    let scores = { X: 0, O: 0, D: 0 };

    function newGame() {
      cells   = Array(9).fill('');
      current = 'X';
      over    = false;
      render();
      setStatus();
    }

    function render() {
      boardEl.innerHTML = '';
      cells.forEach((v, i) => {
        const div = document.createElement('div');
        div.className = 'cell' + (v ? ` ${v.toLowerCase()} taken` : '');
        div.textContent = v;
        div.addEventListener('click', () => onClick(i));
        boardEl.appendChild(div);
      });
    }

    function onClick(i) {
      if (over || cells[i]) return;
      if (vsCPU && current === 'O') return;
      move(i);
      if (vsCPU && !over) setTimeout(cpuTurn, 350);
    }

    function move(i) {
      cells[i] = current;
      render();

      const win = getWin();
      if (win) {
        highlightWin(win);
        statusEl.textContent = `${current} wins!`;
        scores[current]++;
        updateScore();
        over = true;
      } else if (cells.every(Boolean)) {
        statusEl.textContent = "Draw!";
        scores.D++;
        updateScore();
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        setStatus();
      }
    }

    function setStatus() {
      if (vsCPU && current === 'O') {
        statusEl.textContent = "CPU is thinking...";
      } else {
        statusEl.textContent = `${current}'s turn`;
      }
    }

    function getWin() {
      return WINS.find(([a,b,c]) => cells[a] && cells[a] === cells[b] && cells[b] === cells[c]) ?? null;
    }

    function highlightWin(combo) {
      const divs = boardEl.querySelectorAll('.cell');
      combo.forEach(i => divs[i].classList.add('win'));
    }

    function updateScore() {
      document.getElementById('sx').textContent = scores.X;
      document.getElementById('so').textContent = scores.O;
      document.getElementById('sd').textContent = scores.D;
    }

    // --- Minimax AI ---
    function cpuTurn() {
      if (over) return;
      const i = bestMove([...cells]);
      move(i);
    }

    function bestMove(b) {
      let best = -Infinity, idx = -1;
      b.forEach((v, i) => {
        if (v) return;
        b[i] = 'O';
        const score = minimax(b, false, 0);
        b[i] = '';
        if (score > best) { best = score; idx = i; }
      });
      return idx;
    }

    function minimax(b, isMax, depth) {
      const win = WINS.find(([a,c,d]) => b[a] && b[a] === b[c] && b[c] === b[d]);
      if (win) return b[win[0]] === 'O' ? 10 - depth : depth - 10;
      if (b.every(Boolean)) return 0;

      if (isMax) {
        let best = -Infinity;
        b.forEach((v, i) => {
          if (v) return;
          b[i] = 'O';
          best = Math.max(best, minimax(b, false, depth + 1));
          b[i] = '';
        });
        return best;
      } else {
        let best = Infinity;
        b.forEach((v, i) => {
          if (v) return;
          b[i] = 'X';
          best = Math.min(best, minimax(b, true, depth + 1));
          b[i] = '';
        });
        return best;
      }
    }

    // --- Controls ---
    restartBtn.addEventListener('click', newGame);

    modeBtn.addEventListener('click', () => {
      vsCPU = !vsCPU;
      modeBtn.textContent = vsCPU ? 'vs Human' : 'vs CPU';
      modeBtn.classList.toggle('active', vsCPU);
      newGame();
    });

    newGame();
  </script>
</body>
</html>
